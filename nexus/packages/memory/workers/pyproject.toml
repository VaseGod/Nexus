[project]
name = "nexus-compaction-worker"
version = "0.1.0"
description = "NEXUS Memory Compaction Daemon"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.0",
    "apscheduler>=3.10.0",
    "structlog>=24.1.0",
    "httpx>=0.27.0",
    "lancedb>=0.8.0",
    "sentence-transformers>=3.0.0",
    "numpy>=1.26.0",
    "pydantic>=2.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
